name: Deploy

on:
  pull_request:
    branches:
      - temp/test-dev
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    env:
      DB_URL: ${{ secrets.DB_URL }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      KAKAO_MAP_REST_API_KEY: ${{ secrets.KAKAO_MAP_REST_API_KEY }}
      KAKAO_MAP_BASE_URL: ${{ secrets.KAKAO_MAP_BASE_URL }}
      JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

      ECR_REPOSITORY: photospot
      IMAGE_TAG: ${{ github.sha }}
      REGION: ap-northeast-2

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SetUp JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: Cache SonarCloud packages
        uses: actions/cache@v3
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and analyze
        run: ./gradlew clean build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_NAME }}
          aws-region: $REGION

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image, Push to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name : Make deploy script
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          touch deploy.sh
          echo "aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $REGISTRY" >> deploy.sh
          echo "docker pull $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> deploy.sh
          echo "docker-compose up -d -e PROFILE=dev -e APP_IMAGE=$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> deploy.sh

      - name: Upload to S3
        run: |
          zip -r deploy-$IMAGE_TAG.zip deploy.sh appspec.yml
          aws s3 cp --region $REGION --acl private ./deploy-$IMAGE_TAG.zip s3://photospot-bucket

      - name: Trigger CodeDeploy
        run: |
          aws deploy create-deployment \
          --application-name photospot-deploy \
          --deployment-config-name CodeDeployDefault.AllAtOnce \
          --deployment-group-name codedeploy-group \
          --s3-location bucket=photospot-bucket,bundleType=zip,key=deploy/dev/deploy-$IMAGE_TAG.zip
